version: "3.9"

services:
  backend:
    build:
      context: ./backend/SyncWire.API
      dockerfile: Dockerfile
    container_name: syncwire-backend
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/swagger/index.html"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* variables are baked in at build time by Next.js (standalone
        # output).  Set this to the address a browser can reach the backend at.
        # For local development that is http://localhost:8080; override for
        # production with the public backend URL.
        NEXT_PUBLIC_API_URL: "http://localhost:8080"
    container_name: syncwire-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
